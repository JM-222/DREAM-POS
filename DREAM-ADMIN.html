<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>드림편의점 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Share+Tech+Mono&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:#0a0a0f;color:#e2e8f0;overflow:hidden}
.admin-wrap{display:grid;grid-template-rows:50px auto 1fr;height:100vh}
.admin-header{background:#1a1f2e;border-bottom:1px solid #2d3748;display:flex;align-items:center;padding:0 16px;gap:10px}
.admin-header-logo{height:26px;width:auto}
.admin-brand{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:#fff;letter-spacing:2px;display:flex;align-items:center;gap:7px}
.admin-brand .badge{background:#e84040;color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-weight:700}
.admin-header-center{flex:1;text-align:center;font-family:'Gowun Batang',serif;font-size:15px;color:#00a99c;letter-spacing:4px}
.admin-header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:#68d391;font-family:'Share Tech Mono',monospace}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#68d391;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.header-clock{font-family:'Share Tech Mono',monospace;font-size:12px;color:#a0aec0;letter-spacing:2px}

/* ── 게임 패널 ── */
.game-panel{background:#0d1520;border-bottom:2px solid #00a99c;padding:9px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.game-panel-title{font-family:'Share Tech Mono',monospace;font-size:11px;color:#00a99c;letter-spacing:3px;white-space:nowrap}
.game-input-wrap{display:flex;align-items:center;gap:7px}
.game-input{background:#1a1f2e;border:2px solid #2d6aad;border-radius:6px;padding:6px 14px;font-size:18px;font-weight:700;color:#fff;font-family:'Share Tech Mono',monospace;outline:none;width:150px;text-align:center;transition:border-color .15s}
.game-input:focus{border-color:#00a99c;box-shadow:0 0 0 2px rgba(0,169,156,.2)}
.game-input-unit{font-family:'Share Tech Mono',monospace;font-size:14px;color:#888}
.game-set-btn{background:linear-gradient(135deg,#00a99c,#017165);border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:700;padding:8px 18px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:filter .15s;white-space:nowrap}
.game-set-btn:hover{filter:brightness(1.15)}
.game-status{font-family:'Share Tech Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;white-space:nowrap}
.game-status.active{background:#1a3a1a;color:#68d391;border:1px solid #2d5a2d}
.game-status.inactive{background:#2a2a2a;color:#555;border:1px solid #333}
.game-range-info{font-family:'Share Tech Mono',monospace;font-size:11px;color:#00a99c;padding:5px 12px;border-radius:4px;background:#0a1a18;border:1px solid #014d43}
.game-clear-btn{background:#3d1e1e;border:1px solid #7a2d2d;border-radius:5px;color:#fc8181;font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.game-clear-btn:hover{background:#4a2020}

.admin-body{display:grid;grid-template-columns:230px 1fr 330px;overflow:hidden}
.sidebar{background:#141824;border-right:1px solid #2d3748;display:flex;flex-direction:column;overflow:hidden}
.sidebar-title{padding:12px 14px 8px;font-size:10px;letter-spacing:3px;color:#4a5568;font-family:'Share Tech Mono',monospace;border-bottom:1px solid #1e2536}
.cat-list{flex:1;overflow-y:auto;padding:6px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:7px;cursor:pointer;margin-bottom:3px;transition:all .15s;border:1px solid transparent}
.cat-item:hover{background:#1e2536}
.cat-item.active{background:#1e3a5f;border-color:#2d6aad}
.cat-item-name{font-size:13px;font-weight:500;color:#e2e8f0}
.cat-item.active .cat-item-name{color:#63b3ed}
.cat-count{font-size:10px;color:#4a5568;background:#1e2536;padding:2px 7px;border-radius:10px;font-family:'Share Tech Mono',monospace}
.cat-item.active .cat-count{background:#2a4a7a;color:#90cdf4}
.cat-actions{padding:8px;border-top:1px solid #1e2536}
.main-panel{background:#0f1117;display:flex;flex-direction:column;overflow:hidden}
.main-toolbar{padding:10px 15px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2d3748;background:#141824;flex-shrink:0}
.toolbar-title{font-size:14px;font-weight:700;color:#fff}
.toolbar-count{font-size:11px;color:#4a5568;font-family:'Share Tech Mono',monospace}
.product-table-wrap{flex:1;overflow-y:auto;padding:12px 15px}
.product-table{width:100%;border-collapse:collapse}
.product-table thead tr{border-bottom:1px solid #2d3748}
.product-table thead th{padding:7px 9px;text-align:left;font-size:10px;letter-spacing:2px;color:#4a5568;font-family:'Share Tech Mono',monospace;font-weight:400}
.product-table tbody tr{border-bottom:1px solid #1e2536;transition:background .1s;cursor:pointer}
.product-table tbody tr:hover{background:#141824}
.product-table tbody tr.selected-product{background:#1a2a40}
.product-table td{padding:9px;font-size:12px;color:#e2e8f0;vertical-align:middle}
.prod-thumb{width:34px;height:34px;border-radius:6px;background:#1e2536;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.prod-thumb img{width:34px;height:34px;object-fit:contain;border-radius:6px;padding:1px}
.price-cell{font-family:'Share Tech Mono',monospace;color:#63b3ed;font-size:13px}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;background:#1e2d4a;color:#90cdf4;border:1px solid #2d4a7a}
.row-actions{display:flex;gap:4px}
.row-btn{padding:3px 9px;border-radius:4px;border:1px solid;font-size:10px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .1s}
.row-btn.edit{background:#1e3a5f;border-color:#2d5a9a;color:#90cdf4}
.row-btn.del{background:#3d1e1e;border-color:#7a2d2d;color:#fc8181}
.empty-msg{text-align:center;color:#4a5568;padding:50px 0;font-size:13px}
.edit-panel{background:#141824;border-left:1px solid #2d3748;display:flex;flex-direction:column;overflow:hidden}
.edit-panel-header{padding:12px 15px;border-bottom:1px solid #2d3748;display:flex;align-items:center;justify-content:space-between}
.edit-panel-title{font-size:13px;font-weight:700;color:#fff}
.edit-mode-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.edit-mode-badge.new{background:#1a3a1a;color:#68d391;border:1px solid #2d5a2d}
.edit-mode-badge.modify{background:#1e3a5f;color:#63b3ed;border:1px solid #2d5a9a}
.edit-form{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;letter-spacing:2px;color:#4a5568;font-family:'Share Tech Mono',monospace}
.form-input{background:#0f1117;border:1px solid #2d3748;border-radius:6px;padding:8px 11px;font-size:13px;color:#e2e8f0;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;width:100%}
.form-input:focus{border-color:#4a90d9}
.form-input::placeholder{color:#4a5568}
.form-select{background:#0f1117;border:1px solid #2d3748;border-radius:6px;padding:8px 11px;font-size:13px;color:#e2e8f0;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;cursor:pointer}
.emoji-preview{font-size:32px;text-align:center;padding:10px;background:#0f1117;border-radius:8px;border:1px solid #2d3748;min-height:58px;display:flex;align-items:center;justify-content:center}
.emoji-preview img{width:46px;height:46px;object-fit:contain;border-radius:6px;padding:2px}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:4px}
.emoji-pick{font-size:18px;padding:4px;border-radius:5px;border:1px solid transparent;cursor:pointer;text-align:center;transition:all .1s;background:#0f1117}
.emoji-pick:hover{background:#1e2536;border-color:#2d3748}
.emoji-pick.selected{background:#1e3a5f;border-color:#2d6aad}
.img-upload-area{border:2px dashed #2d3748;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:border-color .15s;background:#0f1117}
.img-upload-area:hover{border-color:#4a90d9}
.img-upload-area input{display:none}
.img-upload-label{font-size:11px;color:#4a5568;cursor:pointer}
.img-preview-wrap{margin-top:7px;display:flex;justify-content:center}
.img-preview-wrap img{width:56px;height:56px;object-fit:contain;border-radius:8px;border:1px solid #2d3748;padding:2px}
.form-footer{padding:12px 15px;border-top:1px solid #2d3748;display:flex;flex-direction:column;gap:6px}
.btn-primary{width:100%;padding:10px;background:linear-gradient(135deg,#2d6aad,#1a4a8a);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;transition:all .15s}
.btn-primary:hover{filter:brightness(1.15)}
.btn-primary.green{background:linear-gradient(135deg,#2d7a3a,#1a5020)}
.btn-secondary{width:100%;padding:8px;background:transparent;border:1px solid #2d3748;border-radius:8px;color:#718096;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.btn-secondary:hover{border-color:#4a5568;color:#a0aec0}
.btn-sm{padding:6px 11px;border-radius:5px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .1s;white-space:nowrap}
.btn-sm.blue{background:#1e3a5f;border-color:#2d5a9a;color:#90cdf4}
.btn-sm.green{background:#1a3a1a;border-color:#2d5a2d;color:#68d391}
.btn-sm.red{background:#3d1e1e;border-color:#7a2d2d;color:#fc8181}
.toast{position:fixed;bottom:18px;right:18px;background:#1a3a1a;border:1px solid #2d5a2d;border-radius:8px;padding:10px 16px;color:#68d391;font-size:12px;font-weight:600;z-index:999;animation:toastIn .2s ease,toastOut .3s ease 2s forwards;display:flex;align-items:center;gap:6px}
.toast.error{background:#3d1e1e;border-color:#7a2d2d;color:#fc8181}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:#141824;border:1px solid #2d3748;border-radius:12px;padding:24px;width:370px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:16px}
.cat-manage-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.cat-manage-item{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#0f1117;border-radius:7px;border:1px solid #2d3748}
.cat-manage-name{font-size:12px;font-weight:500;color:#e2e8f0}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1100}
.confirm-box{background:#141824;border:1px solid #2d3748;border-radius:12px;padding:24px 28px;width:300px;text-align:center}
.confirm-icon{font-size:36px;margin-bottom:9px;display:block}
.confirm-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:6px}
.confirm-msg{font-size:12px;color:#718096;margin-bottom:16px;line-height:1.6}
.confirm-btns{display:flex;gap:7px}
.confirm-btns button{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:none}
.confirm-cancel{background:#1e2536;color:#718096}
.confirm-ok{background:#e84040;color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2d3748;border-radius:4px}
.divider{height:1px;background:#1e2536;margin:3px 0}
</style>
</head>
<body>
<div class="admin-wrap">
  <div class="admin-header">
    <img class="admin-header-logo" id="adminLogo" alt="로고">
    <div class="admin-brand">DREAMPOS <span class="badge">관리자</span></div>
    <div class="admin-header-center">대동제 2026 · 드림편의점</div>
    <div class="admin-header-right">
      <div class="sync-status"><div class="sync-dot"></div>POS 연동 중</div>
      <div class="header-clock" id="adminClock">00:00:00</div>
    </div>
  </div>

  <!-- 게임 목표금액 설정 -->
  <div class="game-panel">
    <div class="game-panel-title">🎯 게임 목표금액 설정</div>
    <div class="game-input-wrap">
      <input type="number" class="game-input" id="gameTargetInput" placeholder="10000" min="0" step="500">
      <span class="game-input-unit">원</span>
    </div>
    <button class="game-set-btn" onclick="setGameTarget()">✔ 적용 · POS 반영</button>
    <div class="game-range-info" id="gameRangeInfo">성공범위: 미설정</div>
    <div class="game-status inactive" id="gameStatus">게임 비활성</div>
    <button class="game-clear-btn" onclick="clearGameTarget()">초기화</button>
  </div>

  <div class="admin-body">
    <div class="sidebar">
      <div class="sidebar-title">카테고리</div>
      <div class="cat-list" id="catList"></div>
      <div class="cat-actions">
        <button class="btn-sm green" onclick="openCatModal()" style="width:100%;padding:8px">카테고리 관리</button>
      </div>
    </div>
    <div class="main-panel">
      <div class="main-toolbar">
        <span class="toolbar-title" id="mainTitle">전체 상품</span>
        <span class="toolbar-count" id="mainCount"></span>
        <div style="margin-left:auto;display:flex;gap:7px">
          <button class="btn-sm blue" onclick="resetToDefault()">기본값 복원</button>
          <button class="btn-sm green" onclick="newProduct()">+ 상품 추가</button>
        </div>
      </div>
      <div class="product-table-wrap">
        <table class="product-table">
          <thead><tr>
            <th style="width:46px">이미지</th><th>상품명</th>
            <th style="width:95px">카테고리</th><th style="width:80px">가격</th>
            <th style="width:95px"></th>
          </tr></thead>
          <tbody id="productTbody"></tbody>
        </table>
        <div class="empty-msg" id="emptyMsg" style="display:none">이 카테고리에 상품이 없습니다</div>
      </div>
    </div>
    <div class="edit-panel">
      <div class="edit-panel-header">
        <span class="edit-panel-title" id="formTitle">상품 추가</span>
        <span class="edit-mode-badge new" id="formBadge">NEW</span>
      </div>
      <div class="edit-form">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label class="form-label">이모지 / 아이콘</label>
          <div class="emoji-preview" id="emojiPreview">☕</div>
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>
        <div class="form-group">
          <label class="form-label">상품 이미지 업로드 (선택)</label>
          <div class="img-upload-area" onclick="document.getElementById('imgFileInput').click()">
            <input type="file" id="imgFileInput" accept="image/*" onchange="handleImgUpload(event)">
            <div class="img-upload-label">📁 클릭하여 이미지 선택<br><span style="font-size:10px;color:#2d3748">(JPG/PNG 권장 100×100px)</span></div>
          </div>
          <div class="img-preview-wrap" id="imgPreviewWrap" style="display:none"></div>
          <button class="btn-secondary" id="clearImgBtn" onclick="clearImg()" style="display:none;margin-top:4px;font-size:11px">이미지 제거</button>
        </div>
        <div class="form-group">
          <label class="form-label">상품명</label>
          <input type="text" class="form-input" id="inputName" placeholder="예: 아메리카노">
        </div>
        <div class="form-group">
          <label class="form-label">가격 (원)</label>
          <input type="number" class="form-input" id="inputPrice" placeholder="예: 2000" min="0" step="100">
        </div>
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="form-select" id="inputCat"></select>
        </div>
        <div class="form-group">
          <label class="form-label">서브 카테고리</label>
          <input type="text" class="form-input" id="inputSub" placeholder="예: 커피 (없으면 비워두세요)">
        </div>
      </div>
      <div class="form-footer">
        <button class="btn-primary green" id="saveBtn" onclick="saveProduct()">저장하고 POS에 반영</button>
        <button class="btn-secondary" onclick="clearForm()">초기화</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="catModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">카테고리 관리</div>
    <div class="cat-manage-list" id="catManageList"></div>
    <div style="display:flex;gap:7px;margin-top:6px">
      <input type="text" class="form-input" id="newCatInput" placeholder="새 카테고리 이름" style="flex:1">
      <button class="btn-sm green" onclick="addCategory()" style="padding:8px 13px">추가</button>
    </div>
    <div style="display:flex;gap:7px;margin-top:12px">
      <button class="btn-secondary" onclick="closeCatModal()" style="flex:1">닫기</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmModal" style="display:none">
  <div class="confirm-box">
    <span class="confirm-icon">🗑️</span>
    <div class="confirm-title">상품 삭제</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-ok" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

  const val=parseInt(document.getElementById('gameTargetInput').value);
  if(!val||val<=0){showToast('올바른 금액을 입력해주세요',true);return;}

function updateGameUI(val){
  const status=document.getElementById('gameStatus');

  if(val>0){
    status.textContent='🟢 게임 활성 중';
    status.className='game-status active';
    range.textContent=`성공범위: ${(val-1000).toLocaleString()}원 ~ ${(val+1000).toLocaleString()}원`;
  }else{
    status.textContent='게임 비활성';
    status.className='game-status inactive';
    range.textContent='성공범위: 미설정';
  }
}

  const val=raw?parseInt(raw):0;
  if(val>0) document.getElementById('gameTargetInput').value=val;
  updateGameUI(val);
}

/* ── 이미지 압축 ── */
function compressImgData(dataUrl){
  return new Promise(resolve=>{
    if(!dataUrl||!dataUrl.startsWith('data:')){resolve(dataUrl);return;}
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=160;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.75));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}
async function compressAndSet(dataUrl,callback){
  const compressed=await compressImgData(dataUrl);
  callback(compressed);
}
async function migrateImages(){
  let changed=false;
  for(const cat of Object.values(products)){
    for(const item of cat.items){
      if(item.imgData&&item.imgData.length>50000){
        item.imgData=await compressImgData(item.imgData);changed=true;
      }
    }
  }
  if(changed){saveToStorage();showToast('기존 이미지를 자동 최적화했습니다 ✅');}
}
function loadProducts(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){try{products=JSON.parse(raw);}catch(e){products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));}}
  else{products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));saveToStorage();}
  recalcNextId();
  setTimeout(()=>migrateImages(),800);
}
function saveToStorage(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(products));
    localStorage.setItem('dreampos_updated',Date.now().toString());
  }catch(e){
    if(e.name==='QuotaExceededError'||e.code===22||e.name==='NS_ERROR_DOM_QUOTA_REACHED'){
      showToast('⚠️ 저장 공간이 꽉 찼습니다! 이미지를 줄이거나 상품을 줄여주세요.',true);
    }else{
      showToast('⚠️ 저장 실패: '+e.message,true);
      console.error('saveToStorage error',e);
    }
  }
}
function recalcNextId(){
  let max=99;
  Object.values(products).forEach(cat=>cat.items.forEach(item=>{if(item.id>max)max=item.id;}));
  nextId=max+1;
}
function resetToDefault(){
  if(!confirm('기본값으로 복원하시겠습니까?'))return;
  products=JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  saveToStorage();selectedCat='전체';renderAll();showToast('기본값으로 복원했습니다');
}

function renderCatList(){
  const list=document.getElementById('catList');list.innerHTML='';
  const allDiv=document.createElement('div');
  allDiv.className='cat-item'+(selectedCat==='전체'?' active':'');
  const allCount=Object.values(products).reduce((s,c)=>s+c.items.length,0);
  allDiv.innerHTML=`<span class="cat-item-name">전체 상품</span><span class="cat-count">${allCount}</span>`;
  allDiv.onclick=()=>{selectedCat='전체';renderCatList();renderProducts();};
  list.appendChild(allDiv);
  list.appendChild(Object.assign(document.createElement('div'),{className:'divider'}));
  Object.entries(products).forEach(([cat,data])=>{
    const div=document.createElement('div');
    div.className='cat-item'+(selectedCat===cat?' active':'');
    div.innerHTML=`<span class="cat-item-name">${cat}</span><span class="cat-count">${data.items.length}</span>`;
    div.onclick=()=>{selectedCat=cat;renderCatList();renderProducts();};
    list.appendChild(div);
  });
}
function renderCatSelect(){
  const sel=document.getElementById('inputCat');const prev=sel.value;sel.innerHTML='';
  Object.keys(products).forEach(cat=>{
    const opt=document.createElement('option');opt.value=cat;opt.textContent=cat;sel.appendChild(opt);
  });
  if(prev&&products[prev])sel.value=prev;
}
function renderProducts(){
  const tbody=document.getElementById('productTbody');
  const emptyMsg=document.getElementById('emptyMsg');
  tbody.innerHTML='';
  let items=[];
  if(selectedCat==='전체'){Object.entries(products).forEach(([cat,data])=>data.items.forEach(item=>items.push({...item,catName:cat})));}
  else if(products[selectedCat]){items=products[selectedCat].items.map(item=>{return{...item,catName:selectedCat};});}
  document.getElementById('mainTitle').textContent=selectedCat==='전체'?'전체 상품':selectedCat;
  document.getElementById('mainCount').textContent=items.length+'개';
  if(!items.length){emptyMsg.style.display='block';return;}emptyMsg.style.display='none';
  items.forEach(item=>{
    const tr=document.createElement('tr');
    tr.className=editingId===item.id?'selected-product':'';
    const thumbHtml=item.imgData
      ?`<div class="prod-thumb"><img src="${item.imgData}" alt="${item.name}"></div>`
      :`<div class="prod-thumb">${item.img}</div>`;
    tr.innerHTML=`<td>${thumbHtml}</td><td style="font-weight:500">${item.name}</td>
      <td><span class="cat-badge">${item.catName}</span></td>
      <td><span class="price-cell">${item.price.toLocaleString()}원</span></td>
      <td><div class="row-actions">
        <button class="row-btn edit" onclick="editProduct(${item.id},'${item.catName}');event.stopPropagation()">수정</button>
        <button class="row-btn del" onclick="askDelete(${item.id},'${item.catName}','${item.name}');event.stopPropagation()">삭제</button>
      </div></td>`;
    tr.onclick=()=>editProduct(item.id,item.catName);
    tbody.appendChild(tr);
  });
}

    btn.className='emoji-pick'+(e===selectedEmoji?' selected':'');

    btn.onclick=()=>{
      selectedEmoji=e;currentImgData=null;
      document.getElementById('emojiPreview').innerHTML=e;
      document.getElementById('imgPreviewWrap').style.display='none';
      document.getElementById('clearImgBtn').style.display='none';
      document.querySelectorAll('.emoji-pick').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });
}
function handleImgUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    compressAndSet(ev.target.result,(compressed)=>{
      currentImgData=compressed;
      document.getElementById('emojiPreview').innerHTML=`<img src="${compressed}" style="width:46px;height:46px;object-fit:contain;border-radius:6px;padding:2px">`;
      const pw=document.getElementById('imgPreviewWrap');pw.style.display='flex';
      pw.innerHTML=`<img src="${compressed}" alt="미리보기" style="object-fit:contain">`;
      document.getElementById('clearImgBtn').style.display='block';
    });
  };
  reader.readAsDataURL(file);
}
function clearImg(){
  currentImgData=null;document.getElementById('imgFileInput').value='';
  document.getElementById('imgPreviewWrap').style.display='none';
  document.getElementById('clearImgBtn').style.display='none';
  document.getElementById('emojiPreview').innerHTML=selectedEmoji;
}
function newProduct(){
  editingId=null;clearForm();
  document.getElementById('formTitle').textContent='상품 추가';
  document.getElementById('formBadge').textContent='NEW';
  document.getElementById('formBadge').className='edit-mode-badge new';
  document.getElementById('saveBtn').textContent='저장하고 POS에 반영';
}
function editProduct(id,catName){
  const item=products[catName]?.items.find(i=>i.id===id);if(!item)return;
  editingId=id;selectedEmoji=item.img;currentImgData=item.imgData||null;
  document.getElementById('editId').value=id;
  document.getElementById('inputName').value=item.name;
  document.getElementById('inputPrice').value=item.price;
  document.getElementById('inputCat').value=catName;
  document.getElementById('inputSub').value=item.sub==='전체'?'':item.sub;
  const ep=document.getElementById('emojiPreview');
  if(currentImgData){
    ep.innerHTML=`<img src="${currentImgData}" style="width:46px;height:46px;object-fit:contain;border-radius:6px;padding:2px">`;
    const pw=document.getElementById('imgPreviewWrap');pw.style.display='flex';
    pw.innerHTML=`<img src="${currentImgData}" alt="미리보기">`;
    document.getElementById('clearImgBtn').style.display='block';
  }else{ep.innerHTML=item.img;document.getElementById('imgPreviewWrap').style.display='none';document.getElementById('clearImgBtn').style.display='none';}
  renderEmojiGrid();renderProducts();
  document.getElementById('formTitle').textContent='상품 수정';
  document.getElementById('formBadge').textContent='EDIT';
  document.getElementById('formBadge').className='edit-mode-badge modify';
  document.getElementById('saveBtn').textContent='수정하고 POS에 반영';
}
function clearForm(){
  editingId=null;selectedEmoji='☕';currentImgData=null;
  ['editId','inputName','inputPrice','inputSub'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('imgFileInput').value='';
  document.getElementById('imgPreviewWrap').style.display='none';
  document.getElementById('clearImgBtn').style.display='none';
  document.getElementById('emojiPreview').innerHTML='☕';
  document.getElementById('formTitle').textContent='상품 추가';
  document.getElementById('formBadge').textContent='NEW';
  document.getElementById('formBadge').className='edit-mode-badge new';
  document.getElementById('saveBtn').textContent='저장하고 POS에 반영';
  renderEmojiGrid();renderProducts();
}
function saveProduct(){
  const name=document.getElementById('inputName').value.trim();
  const price=parseInt(document.getElementById('inputPrice').value);
  const cat=document.getElementById('inputCat').value;
  const sub=document.getElementById('inputSub').value.trim()||'전체';
  if(!name){showToast('상품명을 입력해주세요',true);return;}
  if(!price||price<=0){showToast('올바른 가격을 입력해주세요',true);return;}
  if(!cat||!products[cat]){showToast('카테고리를 선택해주세요',true);return;}
  const newItem={id:editingId!==null?editingId:nextId++,name,img:selectedEmoji,price,sub};
  if(currentImgData)newItem.imgData=currentImgData;
  if(editingId!==null){Object.values(products).forEach(catData=>{const idx=catData.items.findIndex(i=>i.id===editingId);if(idx!==-1)catData.items.splice(idx,1);});}
  if(!products[cat].items)products[cat].items=[];
  products[cat].items.push(newItem);
  updateSubs(cat,sub);saveToStorage();
  showToast(`"${name}" ${editingId!==null?'수정':'추가'} 완료`);
  clearForm();renderAll();
}
function updateSubs(cat,sub){
  if(!products[cat].subs)products[cat].subs=['전체'];
  if(sub&&sub!=='전체'&&!products[cat].subs.includes(sub))products[cat].subs.push(sub);
}
function askDelete(id,catName,name){
  deleteTargetId={id,catName};
  document.getElementById('confirmMsg').textContent=`"${name}" 상품을 삭제하시겠습니까?`;
  document.getElementById('confirmModal').style.display='flex';
}
function closeConfirm(){deleteTargetId=null;document.getElementById('confirmModal').style.display='none';}
function confirmDelete(){
  if(!deleteTargetId)return;
  const {id,catName}=deleteTargetId;
  const cat=products[catName];
  if(cat){const idx=cat.items.findIndex(i=>i.id===id);if(idx!==-1){const n=cat.items[idx].name;cat.items.splice(idx,1);saveToStorage();showToast(`"${n}" 삭제 완료`);}}
  closeConfirm();if(editingId===id)clearForm();renderAll();
}
function openCatModal(){renderCatManageList();document.getElementById('catModal').style.display='flex';}
function closeCatModal(){document.getElementById('newCatInput').value='';document.getElementById('catModal').style.display='none';}
function renderCatManageList(){
  const list=document.getElementById('catManageList');list.innerHTML='';
  Object.entries(products).forEach(([cat,data])=>{
    const div=document.createElement('div');div.className='cat-manage-item';
    div.innerHTML=`<span class="cat-manage-name">${cat} <span style="color:#4a5568;font-size:11px">${data.items.length}개</span></span>
      <button class="btn-sm red" onclick="deleteCategory('${cat}')" ${data.items.length>0?'disabled style="opacity:.4;cursor:not-allowed"':''}>삭제</button>`;
    list.appendChild(div);
  });
}
function addCategory(){
  const name=document.getElementById('newCatInput').value.trim();
  if(!name){showToast('카테고리 이름을 입력해주세요',true);return;}
  if(products[name]){showToast('이미 존재하는 카테고리입니다',true);return;}
  products[name]={subs:['전체'],items:[]};saveToStorage();
  document.getElementById('newCatInput').value='';
  renderCatManageList();renderCatList();renderCatSelect();showToast(`"${name}" 카테고리 추가됨`);
}
function deleteCategory(cat){
  if(products[cat]?.items.length>0){showToast('상품이 있는 카테고리는 삭제할 수 없습니다',true);return;}
  delete products[cat];saveToStorage();
  if(selectedCat===cat)selectedCat='전체';
  renderCatManageList();renderCatList();renderCatSelect();showToast(`"${cat}" 카테고리 삭제됨`);
}
function showToast(msg,isError=false){
  document.querySelector('.toast')?.remove();
  const t=document.createElement('div');t.className='toast'+(isError?' error':'');
  t.innerHTML=(isError?'⚠️ ':'✅ ')+msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}
function updateClock(){
  const n=new Date();
  document.getElementById('adminClock').textContent=
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}
loadProducts();loadGameUI();renderAll();updateClock();setInterval(updateClock,1000);
</script>
</body>
</html>
